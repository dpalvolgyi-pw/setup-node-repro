on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: pwserver-verify-PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Set Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: "yarn"
